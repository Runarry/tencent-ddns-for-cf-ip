provider:
  # web: 抓取公开网页 https://api.uouin.com/cloudflare.html，不需要站长工具 API 账号。
  # api: 使用收费 API，需要 username/key。
  source: "web"
  url: "https://api.uouin.com/cloudflare.html"
  web_url: "https://api.uouin.com/cloudflare.html"
  api_url: "https://api.uouin.com/app/cloudflare"
  username: ""
  key: ""
  nodeids: ["ctcc", "bgp", "cucc"]
  timeout: "20s"

dnspod:
  secret_id: "your-tencent-secret-id"
  secret_key: "your-tencent-secret-key"
  domain: ""
  record_line: "默认"
  ttl: 600

sync:
  interval: "10m"
  managed_prefix: "cf"
  managed_base_subdomain: "cdn"
  # 站长工具请求仍使用 ctcc，DNS 主机名可映射为你想要的标签。
  node_labels:
    ctcc: "ctcc"
  # 默认域名 cdn.q.example.com 使用当前最快的电信节点更新。
  default_nodeid: "ctcc"
  max_records_per_node: 5
  ping_timeout: "3s"
  ping_threshold_ms: 800
  ping_concurrency: 32
  ping_packets: 3
  speed_test:
    enabled: false
    # 启用后填写一个走 Cloudflare 的真实 HTTPS 业务 URL。
    url: "https://your-cf-domain.example.com/probe.bin"
    download_bytes: 1048576
    timeout: "8s"
    concurrency: 8
    # 默认会自动使用 max_records_per_node * 3。
    candidates_per_node: 15
  fallback:
    enabled: true
    wildcard_subdomain: "*.cdn"
    target: ""
    type: "CNAME"

api:
  listen_addr: ":8080"
  bearer_token: "replace-with-a-long-random-token"

subscriptions:
  # 公开订阅地址为 /sub/<public_token>?key=<key>，无需 Bearer Token，请使用足够长的随机值。
  # nodeids 为空时使用全部优选域名；填写后只使用匹配线路的优选域名。
  # 请求可追加 nodeids=ctcc,bgp 动态收窄线路范围。
  - name: "ctcc-main"
    enabled: false
    public_token: "replace-with-a-long-random-subscription-token"
    key: "replace-with-a-long-random-subscription-key"
    format: "base64"
    nodeids: ["ctcc"]
    # 支持 vmess/vless/trojan/ss/hysteria/hysteria2 分享字符串；只会替换实际连接地址。
    shares: []

state:
  state_file: "/data/state.json"
  # Runtime-editable subscriptions managed by the Cloudflare Pages/Workers admin tool.
  subscriptions_file: "/data/subscriptions.json"
